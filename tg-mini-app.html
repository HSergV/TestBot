<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Counter</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
      --radius: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 32px;
      overflow: hidden;
    }

    /* Фоновая сетка */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Счётчик */
    .counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 30vw, 160px);
      line-height: 1;
      color: var(--accent);
      letter-spacing: -2px;
      transition: transform 0.08s ease, color 0.15s ease;
      user-select: none;
    }

    .counter.bump {
      transform: scale(1.08);
      color: #fff;
    }

    /* Кнопка */
    .btn {
      position: relative;
      width: min(320px, 100%);
      padding: 20px 0;
      background: var(--accent);
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 0 0 0 rgba(232,255,71,0.4);
      -webkit-tap-highlight-color: transparent;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.18);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(0.97); }

    .btn.pulse {
      box-shadow: 0 0 0 14px rgba(232,255,71,0);
      animation: ripple 0.4s ease-out forwards;
    }

    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0 rgba(232,255,71,0.5); }
      100% { box-shadow: 0 0 0 20px rgba(232,255,71,0); }
    }

    /* Нижний счётчик нажатий */
    .session {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }
    .session span { color: var(--text); }
  </style>
</head>
<body>

  <div class="counter-wrap">
    <div class="label">Счётчик</div>
    <div class="counter" id="counter">0</div>
  </div>

  <button class="btn" id="btn">+ Нажать</button>

  <div class="session">сессия: <span id="session">0</span> нажатий</div>

  <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand(); // разворачиваем на весь экран
    }

    let count = 0;
    let session = 0;

    const counterEl = document.getElementById('counter');
    const btnEl = document.getElementById('btn');
    const sessionEl = document.getElementById('session');

    btnEl.addEventListener('click', () => {
      count++;
      session++;

      // Обновляем UI
      counterEl.textContent = count;
      sessionEl.textContent = session;

      // Анимация числа
      counterEl.classList.remove('bump');
      void counterEl.offsetWidth; // reflow для перезапуска анимации
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 80);

      // Анимация кнопки
      btnEl.classList.remove('pulse');
      void btnEl.offsetWidth;
      btnEl.classList.add('pulse');

      // Тактильный отклик (если поддерживается Telegram)
      tg?.HapticFeedback?.impactOccurred('light');
    });
  </script>
</body>
</html>
